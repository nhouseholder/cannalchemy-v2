# Cloudflare Pages configuration for MyStrain+
name = "mystrainplus"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# KV namespace for persistent caching (Anthropic responses, quiz results, dispensary regional data)
# Create with: npx wrangler kv:namespace create CACHE
# Then paste the id below
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder_create_via_wrangler_cli"
